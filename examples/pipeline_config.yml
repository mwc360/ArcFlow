# ──────────────────────────────────────────────────────────────
# ArcFlow YAML Pipeline Configuration — Example
# ──────────────────────────────────────────────────────────────
#
# This file is equivalent to defining FlowConfig / DimensionConfig
# dataclasses in Python.  Load it with:
#
#   from arcflow import load_yaml_config
#   tables, dimensions, config = load_yaml_config("pipeline.yml")
#   controller = Controller(spark, config, tables, dimensions)
#
# Schemas use PySpark DDL syntax:
#   https://spark.apache.org/docs/latest/sql-ref-datatypes.html

# ── Global pipeline settings (passed to get_config) ──────────
config:
  streaming_enabled: true
  checkpoint_uri: "Files/checkpoints"
  archive_uri: "Files/archive"
  landing_uri: "Files/landing"
  trigger_interval: "1 seconds"
  await_termination: true

# ── Table registry ────────────────────────────────────────────
tables:
  item:
    format: parquet
    source_uri: "Files/landing/item"
    description: "Item master data"
    trigger_mode: processingTime
    clean_source: true
    schema: >-
      ItemId STRING, SKU STRING, Description STRING, Brand STRING,
      Category STRING, Subcategory STRING, Material STRING,
      NominalSize DOUBLE, EndConnection STRING, PressureClass LONG,
      Weight DOUBLE, Cost DOUBLE, ListPrice DOUBLE,
      IsSDOFCertified STRING, StructuralIndex DOUBLE, SpanRating DOUBLE,
      OrganizationId LONG, GeneratedAt STRING
    zones:
      bronze:
        mode: append
      silver:
        mode: upsert
        merge_keys: [item_id]
        custom_transform: silver_item

  shipment:
    format: eventhub
    source_uri: "Endpoint=sb://..."
    description: "Shipment header"
    trigger_mode: processingTime
    clean_source: true
    schema: >-
      _meta STRUCT<enqueuedTime: STRING, producer: STRING,
                   recordType: STRING, schemaVersion: STRING>,
      data ARRAY<STRUCT<
        CommittedDeliveryDate: STRING, CurrentFacilityId: STRING,
        CustomerId: STRING, CustomerName: STRING,
        DeclaredValue: DOUBLE, DestinationCity: STRING,
        ShipmentId: STRING, Weight: DOUBLE>>
    zones:
      bronze:
        mode: append
        custom_transform: explode_message_payload
      silver:
        mode: append
        custom_transform: silver_shipment

# ── Dimension registry (optional) ────────────────────────────
dimensions:
  dim_shipment_enriched:
    dimension_type: dimension
    source_tables: [shipment, facility]
    source_zone: silver
    target_zone: gold
    transform: build_dim_shipment
    zone_config:
      mode: upsert
      merge_keys: [shipment_id]
    description: "Enriched shipment dimension"
    tags: [gold, logistics]
    owner: analytics-team
